<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="images/arc_logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Architect Card Preview - Cyberpunk Developer ID</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Share+Tech+Mono&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <style>
    :root {
      --bg-light: #f1f5f9;
      --bg-gradient: radial-gradient(circle at 50% 0%, #dbeafe 0%, #f1f5f9 70%);
      --card-bg: linear-gradient(145deg, rgba(4, 6, 15, 0.97) 0%, rgba(12, 17, 34, 0.94) 100%);
      --cyan: #00f0ff;
      --cyan-glow: rgba(0, 240, 255, 0.4);
      --magenta: #ff007f;
      --magenta-glow: rgba(255, 0, 127, 0.3);
      --gold: #ffaa00;
      --green: #00ff66;
      --border: rgba(0, 240, 255, 0.15);
      --text-muted: #475569;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f1f5f9;
      background-image: radial-gradient(circle at 50% 0%, #dbeafe 0%, #f1f5f9 70%);
      color: #0f172a;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #0f172a;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
    }

    .title-arc {
      color: #0f172a;
      -webkit-text-fill-color: #0f172a;
      display: inline-block;
    }

    .title-architect {
      background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .subtitle {
      color: #475569;
      font-size: 0.9rem;
      margin-bottom: 40px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 2px;
      font-weight: 600;
    }

    /* Premium Input Section */
    .input-section {
      background: rgba(4, 6, 15, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 10px 10px 20px;
      border-radius: 16px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      width: 100%;
      max-width: 520px;
      transition: box-shadow 0.3s ease;
    }

    .input-section:focus-within {
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(203, 213, 225, 0.25);
    }

    .input-section label {
      font-family: 'Share Tech Mono', monospace;
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .input-divider {
      width: 1px;
      height: 22px;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .input-section input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 6px;
      color: rgba(255, 255, 255, 0.9);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .input-section input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .input-fetch-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 9px 16px;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .input-fetch-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    /* Card Wrapper */
    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* ========================================================
       ULTRA-PREMIUM CYBERPUNK DEVELOPER ID CARD (YATAY V15)
       ======================================================== */
    /* Card wrapper levels to support button colors outside the card */
    /* Card wrapper levels to support button colors outside the card */
    .card-wrapper.level-1 {
      --theme-primary: #cd7f32;
      --theme-glow-color: 205, 127, 50;
    }
    .card-wrapper.level-2 {
      --theme-primary: #b8a99a;
      --theme-glow-color: 184, 169, 154;
    }
    .card-wrapper.level-3 {
      --theme-primary: #cbd5e1;
      --theme-glow-color: 203, 213, 225;
    }
    .card-wrapper.level-4 {
      --theme-primary: #e2e2a8;
      --theme-glow-color: 226, 226, 168;
    }
    .card-wrapper.level-5 {
      --theme-primary: #eab308;
      --theme-glow-color: 234, 179, 8;
    }

    /* Level specific themes defined directly on the card to survive html-to-image cloning */
    .sci-fi-card {
      /* Default level-1 values */
      --theme-primary: #cd7f32;
      --theme-glow-color: 205, 127, 50;
      --theme-bezel: linear-gradient(135deg, #a8703c 0%, #5e3a15 40%, #1c0e02 70%, #dca06c 100%); /* Bronze */
    }
    .sci-fi-card.level-1 {
      --theme-primary: #cd7f32; /* Bronze */
      --theme-glow-color: 205, 127, 50;
      --theme-bezel: linear-gradient(135deg, #a8703c 0%, #5e3a15 40%, #1c0e02 70%, #dca06c 100%); /* Bronze */
    }
    .sci-fi-card.level-1 .hud-badge-logo-img {
      filter: sepia(1) saturate(2) brightness(0.8) contrast(1.2) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)); /* Bronze filter */
    }
    .sci-fi-card.level-2 {
      --theme-primary: #b8a99a; /* Bronze-Silver */
      --theme-glow-color: 184, 169, 154;
      --theme-bezel: linear-gradient(135deg, #b0bec5 0%, #6d5b4b 40%, #201a14 70%, #a8886d 100%); /* Bronze-Silver */
    }
    .sci-fi-card.level-2 .hud-badge-logo-img {
      filter: sepia(0.6) saturate(1.2) brightness(0.9) contrast(1.1) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)); /* Bronze-Silver filter */
    }
    .sci-fi-card.level-3 {
      --theme-primary: #cbd5e1; /* Silver */
      --theme-glow-color: 203, 213, 225;
      --theme-bezel: linear-gradient(135deg, #e2e8f0 0%, #64748b 40%, #1e293b 70%, #cbd5e1 100%); /* Silver */
    }
    .sci-fi-card.level-3 .hud-badge-logo-img {
      filter: grayscale(1) brightness(1.2) contrast(1.1) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)); /* Silver filter */
    }
    .sci-fi-card.level-4 {
      --theme-primary: #e2e2a8; /* Silver-Gold */
      --theme-glow-color: 226, 226, 168;
      --theme-bezel: linear-gradient(135deg, #fef08a 0%, #6b7280 40%, #1f2937 70%, #d1d5db 100%); /* Silver-Gold */
    }
    .sci-fi-card.level-4 .hud-badge-logo-img {
      filter: sepia(0.3) saturate(1.1) brightness(1.1) contrast(1.1) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)); /* Silver-Gold filter */
    }
    .sci-fi-card.level-5 {
      --theme-primary: #eab308; /* Gold */
      --theme-glow-color: 234, 179, 8;
      --theme-bezel: linear-gradient(135deg, #ffe066 0%, #b38600 40%, #332600 70%, #ffd11a 100%); /* Gold */
    }
    .sci-fi-card.level-5 .hud-badge-logo-img {
      filter: sepia(1) saturate(3) brightness(1.0) contrast(1.1) drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)); /* Gold filter */
    }

    .sci-fi-card {
      width: 540px;
      height: 310px;
      background: var(--theme-card-bg, linear-gradient(145deg, rgba(4, 6, 15, 0.97) 0%, rgba(12, 17, 34, 0.94) 100%));
      border-radius: 24px;
      position: relative;
      padding: 32px 24px 24px 24px; /* Üst başlık için boşluk ayarı */
      display: flex;
      gap: 24px;
      border: 2px solid rgba(255, 255, 255, 0.08); /* Şık metalik çerçeve */
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Top Strip Header for the card */
    .card-top-bar {
      position: absolute;
      top: 10px;
      left: 24px;
      right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(var(--theme-glow-color), 0.1);
      padding-bottom: 4px;
      pointer-events: none;
      z-index: 10;
    }

    .card-top-bar .tech-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      color: rgba(var(--theme-glow-color), 0.4);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Premium reflective gradient border matching the level-specific metal bezel */
    .sci-fi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2px; /* Border thickness */
      background: var(--theme-bezel); /* Dynamic metal frame for the entire card! */
      -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 10;
    }

    /* Grid overlay removed */
    .sci-fi-card::after {
      display: none;
    }

        .hud-crt-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      border-radius: 24px;
      mix-blend-mode: screen;
      opacity: 0.85;
    }


    .sci-fi-card:hover {
      transform: translateY(-8px) rotate(0.5deg);
      box-shadow: 0 40px 80px rgba(var(--theme-glow-color), 0.2);
      border-color: rgba(var(--theme-glow-color), 0.4);
    }

    /* Tech HUD Lines */
    .hud-line {
      position: absolute;
      border: 1px solid rgba(var(--theme-glow-color), 0.2);
      pointer-events: none;
      z-index: 2;
    }
    .hud-tl { top: 15px; left: 15px; width: 20px; height: 20px; border-right: none; border-bottom: none; }
    .hud-tr { top: 15px; right: 15px; width: 20px; height: 20px; border-left: none; border-bottom: none; }
    .hud-bl { bottom: 15px; left: 15px; width: 20px; height: 20px; border-right: none; border-top: none; }
    .hud-br { bottom: 15px; right: 15px; width: 20px; height: 20px; border-left: none; border-top: none; }

    /* Left Side: Avatar HUD Panel */
    .hud-avatar-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 140px;
      flex-shrink: 0;
      justify-content: center;
      gap: 15px;
      padding-right: 25px;
      z-index: 2;
      position: relative;
    }

    .hud-avatar-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin-bottom: 52px;
      border-radius: 50%;
      /* Dual-ring metallic frame structure matching the custom logo frame */
      background: var(--theme-bezel); /* Dynamic metal bezel */
      box-shadow: 
        0 8px 24px rgba(0, 0, 0, 0.7), /* Drop shadow */
        inset 0 0 0 1.5px #0a1128, /* Inner dark contrast gap */
        inset 0 0 0 3px rgba(255, 255, 255, 0.2); /* Inner highlight line */
      padding: 3.5px; /* Bezel thickness */
    }



    .hud-avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background-color: #0c0f1d;
      border: none;
      position: relative;
      z-index: 1;
    }

    .hud-badge-container {
      position: absolute;
      bottom: -6px;
      left: -6px;
      z-index: 3;
    }

    /* Arch-shaped border for the badge icon matching the Arc logo shape */
    .hud-badge-circle {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    /* Centered Arc logo image with clean scaling and drop shadow */
    .hud-badge-logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 4px rgba(var(--theme-glow-color), 0.4));
    }

    /* Redesigned Level badge: Circular steel bezel matching the logo frame, with a subtle glow */
    .hud-badge-num-pill {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 22px;
      height: 22px;
      background: var(--theme-bezel); /* Dynamic metal bezel */
      border-radius: 50%; /* Perfect circular frame */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
      padding: 2px; /* Bezel thickness */
      box-shadow: 
        0 2px 8px rgba(0, 0, 0, 0.8),
        0 0 8px rgba(var(--theme-glow-color), 0.3); /* Subtle, non-distracting cyan glow */
    }

    /* Internal gap for the level badge */
    .hud-badge-num-pill::before {
      content: '';
      position: absolute;
      inset: 2px; /* Matches padding */
      background: #020306;
      border-radius: 50%;
      z-index: -1;
    }

    .hud-badge-num {
      font-size: 0.75rem; /* Highly legible */
      font-weight: 900;
      color: var(--theme-primary); /* Soft dynamic text */
      font-family: 'Share Tech Mono', monospace;
      text-shadow: 0 0 4px rgba(var(--theme-glow-color), 0.6);
      line-height: 1;
      transform: translateY(-0.5px);
    }

    /* Re-styled, beautiful single-line tech ID tag */
    .hud-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--theme-primary);
      letter-spacing: 1px;
      background: rgba(var(--theme-glow-color), 0.05);
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid rgba(var(--theme-glow-color), 0.3);
      text-transform: uppercase;
      margin-top: 8px;
      display: inline-block;
      white-space: nowrap;
      box-shadow: 
        inset 0 1px 3px rgba(var(--theme-glow-color), 0.05),
        0 2px 6px rgba(0, 0, 0, 0.4);
    }

    /* Right Column: Info & Code Overlay */
    .hud-info-column {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-grow: 1;
      z-index: 2;
      padding-left: 20px; /* Blok olarak sağa kaydırmak için sol boşluk eklendi */
    }

    /* Uçlara gittikçe kaybolan dikey çizgi */
    .hud-divider {
      width: 1px;
      height: 180px; /* Kart yüksekliğine göre ortalanmış şık yükseklik */
      align-self: center;
      background: linear-gradient(to bottom, 
        transparent 0%, 
        rgba(var(--theme-glow-color), 0.22) 20%, 
        rgba(var(--theme-glow-color), 0.22) 80%, 
        transparent 100%
      );
      flex-shrink: 0;
      z-index: 2;
    }

    .hud-footer-spacer {
      height: 32px;
      margin-top: 6px;
    }

    .hud-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      padding-bottom: 6px;
    }

    .hud-titles {
      display: flex;
      flex-direction: column;
    }

    .hud-class-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.52rem;
      color: var(--theme-primary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
      margin-bottom: 4px;
      position: relative;
      padding-bottom: 4px;
      display: inline-block;
      align-self: flex-start;
    }

    .hud-class-label::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -10px;
      right: -10px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(var(--theme-glow-color), 0.6) 30%, rgba(var(--theme-glow-color), 0.6) 70%, transparent);
    }

    .hud-username {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff; /* Temiz beyaz renge geri döndü */
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    }

    .hud-username span.at {
      color: var(--theme-primary);
    }

    /* ========================================================
       INTEGRATED NATIVE CODE COMPARTMENT
       ======================================================== */
    .hud-code-overlay {
      width: 100%;
      margin: -10px 0 12px 0; /* Kod bloğunu yukarı kaydırmak için negatif top-margin uygulandı */
      position: relative;
    }

    .hud-code-scanner-line {
      display: none; /* Sol dikey iki renkli çizgi kaldırıldı */
    }

    .code-lines-container {
      font-family: 'Fira Code', monospace;
      font-size: 0.88rem;
      line-height: 1.7;
      color: #cbd5e1;
      padding-left: 0px; /* Hizalamayı eşitlemek için dolgu sıfırlandı */
    }

    .code-line {
      display: flex;
      gap: 12px;
    }

    .line-number {
      color: #334155;
      width: 12px;
      text-align: right;
      user-select: none;
      font-size: 0.8rem;
    }

    .code-content {
      color: #cbd5e1;
      text-shadow: none; /* Kirli gölgeler temizlendi */
    }

    .code-content span.keyword { color: #ff5e97; font-weight: 500; }
    .code-content span.string { color: #00ff66; }
    .code-content span.number { color: var(--theme-primary); }
    .code-content span.property { color: #818cf8; }
    .code-content span.comment { color: #475569; font-style: italic; }

     /* Car Decal Stickers */


    .decal-door {
      position: absolute;
      left: 235px;
      bottom: 42px;
      transform: rotate(-5deg);
      pointer-events: none;
      z-index: 5;
      opacity: 0.72;
      filter: brightness(0.8) contrast(0.88) saturate(0.7);
    }

    .nfs-sticker {
      background: none;
      padding: 0;
      box-shadow: none;
      display: inline-block;
      text-align: left;
    }

    .nfs-line-1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.65rem;
      font-weight: 950;
      font-style: italic;
      color: #e2e8f0;
      line-height: 0.95;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      text-shadow: 
        1px 1px 0 #0c0f1d, 
        -1px -1px 0 #0c0f1d, 
        1px -1px 0 #0c0f1d, 
        -1px 1px 0 #0c0f1d,
        0 2px 4px rgba(0, 0, 0, 0.9);
      white-space: nowrap;
    }

    .nfs-small {
      font-size: 0.40rem;
      font-weight: 950;
      margin-left: 2px;
      color: #e2e8f0;
      vertical-align: middle;
      text-shadow: 
        1px 1px 0 #0c0f1d, 
        -1px -1px 0 #0c0f1d, 
        1px -1px 0 #0c0f1d, 
        -1px 1px 0 #0c0f1d;
    }

    .nfs-line-2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 950;
      font-style: italic;
      color: #e2e8f0;
      line-height: 0.95;
      margin-top: 1px;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      text-shadow: 
        1px 1.2px 0 #0c0f1d, 
        -1px -1.2px 0 #0c0f1d, 
        1px -1.2px 0 #0c0f1d, 
        -1px 1.2px 0 #0c0f1d,
        0 3px 5px rgba(0, 0, 0, 0.9);
      white-space: nowrap;
    }

    /* Micro coordinate labels */
    .micro-spec {
      position: absolute;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.52rem;
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 0.5px;
      pointer-events: none;
      user-select: none;
      z-index: 2;
    }
    .spec-tl { top: 12px; left: 18px; }
    .spec-tr { top: 12px; right: 18px; }
    .spec-bl { bottom: 12px; left: 18px; }
    .spec-br { bottom: 12px; right: 18px; }

    /* Level Selector styling */
    .level-selector-row {
      display: flex;
      gap: 0;
      margin-top: 16px;
      background: rgba(4, 6, 15, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 4px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .level-select-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      position: relative;
    }

    .level-select-btn:hover:not(.active) {
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.05);
    }

    .level-select-btn.active {
      background: linear-gradient(135deg,
        rgba(var(--theme-glow-color), 0.18) 0%,
        rgba(var(--theme-glow-color), 0.08) 100%
      );
      color: rgba(var(--theme-glow-color), 1);
      text-shadow: 0 0 12px rgba(var(--theme-glow-color), 0.7);
      box-shadow:
        inset 0 0 0 1px rgba(var(--theme-glow-color), 0.3),
        0 0 16px rgba(var(--theme-glow-color), 0.1);
    }

    /* Action Buttons Row */
    .actions-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      width: 100%;
      max-width: 540px;
      justify-content: center;
    }

    .action-btn {
      flex: 1;
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Shimmer sweep */
    .action-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s ease;
      pointer-events: none;
    }
    .action-btn:hover::before {
      left: 150%;
    }

    .btn-download {
      background: linear-gradient(135deg,
        rgba(var(--theme-glow-color), 0.9) 0%,
        rgba(var(--theme-glow-color), 0.55) 100%
      );
      color: #0a0c14;
      box-shadow:
        0 4px 20px rgba(var(--theme-glow-color), 0.35),
        inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(var(--theme-glow-color), 0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
      filter: brightness(1.1);
    }

    .btn-share {
      background: rgba(10, 12, 20, 0.8);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.85);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.1),
        0 4px 20px rgba(0,0,0,0.3);
    }

    .btn-share:hover {
      transform: translateY(-2px);
      background: rgba(15, 18, 30, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(var(--theme-glow-color), 0.45),
        0 8px 30px rgba(var(--theme-glow-color), 0.2);
      color: #fff;
    }
  </style>
</head>

  <script>
    // CRT Noise & Scanline Canvas Generator
    function generateNoisePNG(opacity = 0.07, size = 150) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(size, size);
      const data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        const val = Math.floor(Math.random() * 255);
        data[i] = val;
        data[i+1] = val;
        data[i+2] = val;
        data[i+3] = Math.random() * 255 * opacity;
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL('image/png');
    }

    function generateScanlinePNG(color = '205, 127, 50', opacity = 0.025, spacing = 3) {
      const canvas = document.createElement('canvas');
      canvas.width = 1;
      canvas.height = spacing;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = `rgba(${color}, ${opacity})`;
      ctx.fillRect(0, 0, 1, 1);
      return canvas.toDataURL('image/png');
    }

    function updateCRTStyle(lvl) {
      const colors = {
        1: '205, 127, 50',
        2: '184, 169, 154',
        3: '203, 213, 225',
        4: '226, 226, 168',
        5: '234, 179, 8'
      };
      const color = colors[lvl] || '205, 127, 50';
      const noise = generateNoisePNG(0.08, 120);
      const scanlines = generateScanlinePNG(color, 0.025, 3);
      
      const overlay = document.querySelector('.hud-crt-overlay');
      if (overlay) {
        overlay.style.backgroundImage = `url(${noise}), url(${scanlines})`;
      }

    }

    // Twitter handle input handler
    const twitterInput = document.getElementById('twitter-username');
    const hudAvatar = document.getElementById('hud-avatar');
    const hudUsernameTxt = document.getElementById('hud-username-txt');

    let currentAvatarUsername = '';
    function updateAvatar(username) {
      hudUsernameTxt.textContent = username;
      currentAvatarUsername = username;
      
      const avatarImg = document.getElementById('hud-avatar');
      const proxyUrl = `https://images.weserv.nl/?url=https://unavatar.io/twitter/${encodeURIComponent(username)}`;
      
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = function() {
        if (currentAvatarUsername !== username) return;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = img.naturalWidth;
        tempCanvas.height = img.naturalHeight;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        try {
          avatarImg.src = tempCanvas.toDataURL('image/png');
        } catch (e) {
          console.error("Canvas toDataURL failed:", e);
          avatarImg.src = proxyUrl;
        }
      };
      img.onerror = function() {
        console.error("Failed to load avatar image via proxy");
        if (currentAvatarUsername === username) {
          avatarImg.src = `https://unavatar.io/twitter/${username}`;
        }
      };
      img.src = proxyUrl;
    }

    twitterInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const username = twitterInput.value.trim() || 'avatar';
        updateAvatar(username);
      }
    });

    const fetchBtn = document.getElementById('fetch-btn');
    if (fetchBtn) {
      fetchBtn.addEventListener('click', () => {
        const username = twitterInput.value.trim() || 'avatar';
        updateAvatar(username);
      });
    }

    // Initialize avatar on page load to ensure base64 conversion is active
    updateAvatar(twitterInput.value.trim() || 'samconnerone');
    updateCRTStyle(1);

    // Level roles
    const roles = {
      1: { name: "Arc Initiate", valName: "Architect 1" },
      2: { name: "Arc Specialist", valName: "Architect 2" },
      3: { name: "Arc Master", valName: "Architect 3" },
      4: { name: "Arc Commander", valName: "Architect 4" },
      5: { name: "Arc Legend", valName: "Architect 5" }
    };

    // Level buttons action
    document.querySelectorAll('.level-select-btn').forEach(btn => {
       btn.addEventListener('click', () => {
         document.querySelectorAll('.level-select-btn').forEach(b => b.classList.remove('active'));
         btn.classList.add('active');

         const lvl = parseInt(btn.getAttribute('data-level'));

         document.getElementById('badge-number').textContent = lvl;
         document.getElementById('code-level-num').textContent = lvl;
         document.getElementById('code-role-str').textContent = `"${roles[lvl].name}"`;

         // Update sci-fi-card classes to update theme colors/gradients/borders
         const card = document.querySelector(".sci-fi-card");
         card.className = "sci-fi-card"; // Reset
         card.classList.add(`level-${lvl}`);

         // Update card-wrapper classes to style level select buttons outside card
         const wrapper = document.querySelector(".card-wrapper");
         wrapper.className = "card-wrapper";
         wrapper.classList.add(`level-${lvl}`);
         
         // Update CRT Noise and Scanlines dynamically
         updateCRTStyle(lvl);
       });
    });

    // ── Shared Serial Counter ──────────────────────────────────
    const COUNTER_NAMESPACE = 'slatro';
    const COUNTER_KEY       = 'architect-card-v1';
    const COUNTER_BASE      = `https://api.counterapi.dev/v1/${COUNTER_NAMESPACE}/${COUNTER_KEY}`;

    function formatSerial(n) {
      return String(n).padStart(3, '0');
    }

    function setSerialLabel(n) {
      const el = document.getElementById('card-serial-label');
      if (el) el.textContent = `ID // AC - ${formatSerial(n)}`;
    }

    // On load: fetch current count (without incrementing) and display it
    fetch(`${COUNTER_BASE}/get`)
      .then(r => r.json())
      .then(data => { if (data && data.count !== undefined) setSerialLabel(data.count + 1); })
      .catch(() => setSerialLabel('???'));

    // Action buttons click handlers
    document.getElementById('download-btn').addEventListener('click', () => {
      const card = document.querySelector(".sci-fi-card");
      const username = document.getElementById('hud-username-txt').textContent;

      // 1. Increment shared counter first, then download
      fetch(`${COUNTER_BASE}/up`)
        .then(r => r.json())
        .then(data => {
          const serial = (data && data.count !== undefined) ? data.count : '???';
          setSerialLabel(serial);

          // 2. Small delay so DOM updates before capture
          return new Promise(resolve => setTimeout(resolve, 80));
        })
        .catch(() => {}) // if offline, still download
        .finally(() => {
          htmlToImage.toCanvas(card, {
            pixelRatio: 3,
            style: { transform: 'scale(1)', transformOrigin: 'top left' }
          })
          .then(canvas => {
            const link = document.createElement('a');
            link.download = `${username}_arc_card.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          })
          .catch(error => console.error('Error capturing card:', error));
        });
    });


    document.getElementById('share-btn').addEventListener('click', () => {
      const tier      = document.getElementById('badge-number').textContent.trim();
      const activeBtn = document.querySelector('.level-select-btn.active');
      const lvl       = activeBtn ? parseInt(activeBtn.getAttribute('data-level')) : 1;
      const title     = roles[lvl] ? roles[lvl].name : 'Arc Initiate';

      // Extract serial from label e.g. "ID // AC - 007" → "AC - 007"
      const serialLabel = document.getElementById('card-serial-label');
      const serialMatch = serialLabel ? serialLabel.textContent.match(/AC - (\S+)/) : null;
      const serial      = serialMatch ? `AC - ${serialMatch[1]}` : 'AC - ???';

      const shareText =
`Just built my @arc Architect Card!

• Tier: Architect ${tier}

• Title: ${title}

• ID: ${serial}

Get your Architect Card here: https://architect-card.vercel.app/`;

      window.open(
        `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`,
        '_blank'
      );
    });
  </script>
</body>
</html>
